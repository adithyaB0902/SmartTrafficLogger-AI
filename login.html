<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TrafficLog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0f12; --surface: #141720; --surface2: #1c2030;
            --border: #2a2f45; --border2: #343b56; --accent: #f5a623;
            --red: #e84545; --text: #e8ecf5; --text2: #8a95b0; --text3: #555f7a;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(245,166,35,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(74,158,255,0.04) 0%, transparent 50%);
        }
        .login-wrap {
            width: 100%; max-width: 400px; padding: 1rem;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform:none; } }
        .login-logo {
            text-align: center; margin-bottom: 2.5rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem; font-weight: 800; letter-spacing: 0.05em;
        }
        .login-logo span { color: var(--accent); }
        .login-logo small {
            display: block; font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text3); letter-spacing: 0.15em;
            text-transform: uppercase; margin-top: 4px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 2rem;
        }
        .login-card h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.4rem; font-weight: 700;
            margin-bottom: 1.5rem; letter-spacing: 0.03em;
        }
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text3); margin-bottom: 6px;
        }
        .form-control {
            width: 100%; background: var(--surface2);
            border: 1px solid var(--border2); border-radius: 5px;
            color: var(--text); font-family: 'Barlow', sans-serif;
            font-size: 0.9rem; padding: 11px 14px; outline: none;
            transition: border-color 0.15s;
        }
        .form-control:focus { border-color: var(--accent); }
        .form-control::placeholder { color: var(--text3); }
        .btn-login {
            width: 100%; margin-top: 1.5rem;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            background: var(--accent); color: #000;
            border: none; border-radius: 5px;
            padding: 12px; cursor: pointer;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #e8920f; }
        .flash-error {
            padding: 10px 14px; border-radius: 5px; font-size: 0.85rem;
            background: rgba(232,69,69,0.1); border: 1px solid rgba(232,69,69,0.3);
            color: var(--red); margin-bottom: 1rem;
        }
        .hint {
            text-align: center; margin-top: 1.25rem;
            font-size: 0.75rem; color: var(--text3);
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-logo">
        🚦 Traffic<span>Log</span>
        <small>Smart Violation Management System</small>
    </div>
    <div class="login-card">
        <h2>Admin Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in messages %}
            <div class="flash-error">⚠ {{ msg }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input id="username" name="username" class="form-control" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input id="password" name="password" type="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Sign In →</button>
        </form>
    </div>
    <p class="hint">AUTHORIZED PERSONNEL ONLY</p>
</div>
</body>
</html>
